<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Site</title>

  <style>
    body{
      margin:0;
      color:white;
      background: linear-gradient(-45deg, #020617, #0ea5e9, #6366f1, #020617);
      background-size: 400% 400%;
      animation: gradientMove 12s ease infinite;
    }

    @keyframes gradientMove {
      0% {background-position:0% 50%;}
      50% {background-position:100% 50%;}
      100% {background-position:0% 50%;}
    }
  </style>

</head>
<body>

  <h1>🔥 My Website</h1>
  <p>Ultra modern background 😎</p>

</body>
</html>
